name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust contracts ────────────────────────────────────────────────────────
  contracts:
    name: ink! contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-contract
        run: cargo install --force --locked cargo-contract

      - name: Build all contracts
        working-directory: contracts
        run: |
          for dir in registry resolver reverse registrar community attestation; do
            echo "=== Building $dir ==="
            cd $dir
            cargo contract build --release
            cd ..
          done

      - name: Unit tests (off-chain #[ink::test])
        working-directory: contracts
        run: |
          for dir in registry resolver reverse registrar community attestation; do
            echo "=== Unit tests: $dir ==="
            cd $dir
            cargo test
            cd ..
          done

      - name: Start substrate-contracts-node
        run: |
          curl -L https://github.com/paritytech/substrate-contracts-node/releases/latest/download/substrate-contracts-node-linux.tar.gz \
            | tar xz
          ./substrate-contracts-node --dev --tmp --rpc-port 9944 --rpc-cors all &
          sleep 5

      - name: E2E tests (#[ink_e2e::test])
        working-directory: contracts
        run: |
          for dir in registry resolver reverse registrar community attestation; do
            echo "=== E2E: $dir ==="
            cd $dir
            cargo test --features e2e-tests || true
            cd ..
          done
        env:
          CONTRACTS_NODE_URL: ws://127.0.0.1:9944

  # ── SDK ───────────────────────────────────────────────────────────────────
  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm --filter @pns/sdk build

      - name: SDK unit tests (namehash, pure logic)
        run: pnpm --filter @pns/sdk test

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Next.js frontend
    runs-on: ubuntu-latest
    needs: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @pns/web build
